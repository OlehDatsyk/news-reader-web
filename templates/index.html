<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>News Reader — V2</title>
  <link rel="icon" href="{{ url_for('static', filename='img/placeholder.svg') }}" type="image/svg+xml" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>

  <!-- ======================= HEADER ======================= -->
  <header class="app-header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-icon">📰</span>
        <span class="brand-name">News Reader</span>
      </div>

      <div class="search-wrap">
        <input
          id="searchInput"
          type="text"
          class="search-input"
          placeholder="Search news… (e.g. technology, elections, football)"
          autocomplete="off"
        />
        <button id="searchClear" class="search-clear" title="Clear search" aria-label="Clear search">✕</button>
      </div>

      <button id="darkModeToggle" class="icon-btn" title="Toggle dark mode" aria-label="Toggle dark mode">
        <span id="darkModeIcon">🌙</span>
      </button>
    </div>

    <!-- Category filter bar -->
    <nav class="category-bar" id="categoryBar">
      <button class="category-btn active" data-category="general">🌍 General</button>
      <button class="category-btn" data-category="business">💼 Business</button>
      <button class="category-btn" data-category="entertainment">🎬 Entertainment</button>
      <button class="category-btn" data-category="health">🏥 Health</button>
      <button class="category-btn" data-category="science">🔬 Science</button>
      <button class="category-btn" data-category="sports">🏆 Sports</button>
      <button class="category-btn" data-category="technology">💻 Technology</button>
    </nav>
  </header>

  <!-- ======================= MAIN CONTENT ======================= -->
  <main class="app-main">
    <div id="statusBanner" class="status-banner hidden"></div>

    <section id="newsGrid" class="news-grid" aria-live="polite">
      <!-- News cards are injected here by JavaScript -->
    </section>

    <!-- Loading spinner shown during initial load and infinite scroll -->
    <div id="loadingIndicator" class="loading-indicator hidden">
      <div class="spinner"></div>
      <p>Loading fresh headlines…</p>
    </div>

    <!-- Sentinel element used to trigger infinite scrolling -->
    <div id="scrollSentinel" class="scroll-sentinel"></div>

    <!-- Shown when there are no more articles to load -->
    <p id="endOfResults" class="end-of-results hidden">🎉 You've reached the end of the feed.</p>

    <!-- Shown when a search/category yields nothing -->
    <div id="emptyState" class="empty-state hidden">
      <p>😕 No articles found. Try a different keyword or category.</p>
    </div>
  </main>

  <footer class="app-footer">
    <p>Built with Flask, HTML, CSS &amp; JavaScript · Powered by
      <a href="https://newsapi.org" target="_blank" rel="noopener noreferrer">NewsAPI.org</a>
    </p>
  </footer>

  <!-- Card template (cloned by JavaScript for each article) -->
  <template id="newsCardTemplate">
    <article class="news-card">
      <div class="card-image-wrap">
        <img class="card-image" src="" alt="Article image" loading="lazy" />
        <span class="card-source-badge"></span>
      </div>
      <div class="card-body">
        <h3 class="card-title"></h3>
        <p class="card-description"></p>
        <div class="card-meta">
          <span class="card-date"></span>
        </div>
        <a class="card-btn" href="#" target="_blank" rel="noopener noreferrer">Read Article ↗</a>
      </div>
    </article>
  </template>

  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
